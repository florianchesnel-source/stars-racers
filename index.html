const TRACK={

  hz:[0,0,0,-175,-700,-2100,-4200,-5600,-6300,-6300,-6300,-6300,-6300,-6300,-6300,-6300,-6300,-6037,-5501,-4600,-3500,-1925,0,2100,4200,5600,6300,6300,6300,5600,4200,2100,0,-1865,-3259,-3937,-4200,-4200,-4200,-4200,-4200,-4200,-4200,-4200,-4025,-3500,-2800,-2100,-700,700,1400,1400,1400,1400,1400,1400,1400,1367,1313,1050],
  wseg:[1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800,1800],
  w:1800, startX:0, startY:0, startAngle:0.000

const WORLD=0.036;     // échelle monde → 3D (×3 : circuit + route plus grands/larges)
const ELEV=0.036;      // échelle d'altitude (proportionnelle)
const TPTS=TRACK.pts, HZ=TRACK.hz, WSEG=TRACK.wseg, NT=TPTS.length;

// élévation du terrain au point monde (px,py) — copie de getTrackZ du jeu
function trackZ(px,py){
  let minD=Infinity,bestZ=0;
  for(let i=0;i<NT;i++){
    const a=TPTS[i],b=TPTS[(i+1)%NT],dx=b[0]-a[0],dy=b[1]-a[1],len2=dx*dx+dy*dy;
    const t=len2<1e-4?0:Math.max(0,Math.min(1,((px-a[0])*dx+(py-a[1])*dy)/len2));
    const ex=px-(a[0]+t*dx),ey=py-(a[1]+t*dy),d2=ex*ex+ey*ey;
    if(d2<minD){minD=d2;bestZ=HZ[i]+(HZ[(i+1)%NT]-HZ[i])*t;}
  }
  return bestZ;
}

function ps1ify(mat){
  mat.onBeforeCompile=(sh)=>{
    sh.uniforms.uJit={value:JITTER};
    sh.vertexShader='uniform float uJit;\n'+sh.vertexShader.replace('#include <project_vertex>',
      `#include <project_vertex>
       gl_Position.xyz/=gl_Position.w; gl_Position.xy=floor(gl_Position.xy*uJit)/uJit; gl_Position.xyz*=gl_Position.w;`);
  };
  return mat;
}
function roadTexture(){
  // CanvasTexture + Image (data URI) → fiable en file:// (pas de TextureLoader qui plante)
  const cv=document.createElement('canvas'); cv.width=64; cv.height=128;
  cv.getContext('2d').fillStyle='#3a3550'; cv.getContext('2d').fillRect(0,0,64,128);
  const tex=new THREE.CanvasTexture(cv);
  tex.magFilter=THREE.LinearFilter; tex.minFilter=THREE.LinearMipmapLinearFilter; tex.generateMipmaps=true; tex.anisotropy=8;; tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  const img=new Image();
  img.onload=()=>{cv.width=img.width;cv.height=img.height;cv.getContext('2d').drawImage(img,0,0);tex.needsUpdate=true;};
  img.src=ROAD_URI;
  return tex;
}

// ════════ CONSTRUCTION DE LA PISTE (rubans suivant les waypoints + relief) ════════
// Centre LISSÉ (Catmull-Rom fermé) → virages en courbe, plus anguleux. On interpole x,y,élévation,largeur.
function cmr(p0,p1,p2,p3,t){const t2=t*t,t3=t2*t;return 0.5*(2*p1+(-p0+p2)*t+(2*p0-5*p1+4*p2-p3)*t2+(-p0+3*p1-3*p2+p3)*t3);}
const SUB=12, dense=[];
for(let i=0;i<NT;i++){
  const i0=(i-1+NT)%NT,i2=(i+1)%NT,i3=(i+2)%NT;
  for(let s=0;s<SUB;s++){const t=s/SUB;
    dense.push({
      x:cmr(TPTS[i0][0],TPTS[i][0],TPTS[i2][0],TPTS[i3][0],t),
      y:cmr(TPTS[i0][1],TPTS[i][1],TPTS[i2][1],TPTS[i3][1],t),
      hz:cmr(HZ[i0],HZ[i],HZ[i2],HZ[i3],t),
      hw:cmr(WSEG[i0],WSEG[i],WSEG[i2],WSEG[i3],t)/2});
  }
}
const ND=dense.length;
// ════════ BOSSES / TREMPLINS : ondulation d'altitude sur des plages de tronçons ════════
// {from,to}=plage d'indices (0..ND-1) ; amp=hauteur des bosses (unités monde) ; count=nombre de bosses
const BUMPS=[{from:688,to:712,amp:880,ramp:true}];   // RAMPE avant la ligne : sommet sous le plafond, décolle quand même (chute raide)
for(const b of BUMPS){const span=b.to-b.from||1;
  for(let i=b.from;i<=b.to;i++){const wi=((i%ND)+ND)%ND, t=(i-b.from)/span; let prof;
    if(b.ledge){ const edge=b.from+1;                            // MURET descendant : chute sur 1 segment puis creux → remontée
      if(i<=edge) prof = -(i-b.from);                            // 0 → -1 : le rebord (chute brusque)
      else { const rt=(i-edge)/(b.to-edge); prof = -(1-rt)*(1-rt); } }   // -1 → 0 : remontée douce hors du creux
    else if(b.ramp){ const last=b.to;
      prof = (i>=last) ? 0 : (1-Math.cos(Math.PI*Math.min(1,(i-b.from)/((last-1)-b.from))))/2; }
    else prof = Math.sin(t*Math.PI*2*(b.count||1))*Math.sin(Math.PI*t);
    dense[wi].hz += prof*b.amp;
  }
}
function dDir(i){const a=dense[(i-1+ND)%ND],b=dense[(i+1)%ND];let dx=b.x-a.x,dy=b.y-a.y,l=Math.hypot(dx,dy)||1;return[dx/l,dy/l];}
// ════════ LOOPINGS MULTIPLES ════════ chaque boucle : {z0,z1,side} en index dense (z0=entrée, z1=sortie)
const LOOPS_DEF=[{z0:124,z1:128,side:1},{z0:448,z1:452,side:-1}];
function inLoopZone(i){i=((i%ND)+ND)%ND; for(const L of LOOPS_DEF) if(i>=L.z0 && i<=L.z1) return true; return false;}
function loopZoneAt(i){i=((i%ND)+ND)%ND; for(const L of LOOPS) if(i>=L.z0 && i<=L.z1) return L; return null;}
// jog : décalage latéral de sortie de chaque looping, retour progressif (pas de zigzag)
(function(){ const perp=[]; for(let i=0;i<ND;i++){const dd=dDir(i); perp.push([-dd[1],dd[0]]);}
  for(const L of LOOPS_DEF){ if(!L.side)continue; const a=1,b=3,cc=6,d=35, JOG=dense[L.z0].hw*4;
    for(let i=0;i<ND;i++){ const di=((i-L.z0)%ND+ND)%ND; let g=0;
      if(di<=a)g=0; else if(di<b)g=JOG*(di-a)/(b-a); else if(di<=cc)g=JOG; else if(di<d)g=JOG*(1-(di-cc)/(d-cc)); else g=0;
      if(g){dense[i].x+=perp[i][0]*g*L.side; dense[i].y+=perp[i][1]*g*L.side;} } } })();
const GUTTER_FRAC=0.45; // hauteur des bords relevés (fraction de la demi-largeur) ; 0 = route plate
const GUTTER_GRAV=1.0; // force qui ramène vers le fond de la gouttière (gravité latérale)
// Ruban entre deux rails parallèles (offsets en fraction de demi-largeur), bords jointifs.
// plateau=true → posé au niveau du HAUT de la gouttière (pour les bas-côtés)
const TUNNELS=[[36,96],[264,420]];
function buildRibbon(o1,o2,textured,color,plateau){
  const pos=[],uv=[],idx=[],cols=[]; let cum=0;
  const _TF=SUB*2, _tb=(wi)=>{ for(const t of TUNNELS){ if(wi>=t[0]&&wi<=t[1]){ const e=Math.min(wi-t[0],t[1]-wi); return 1-0.58*Math.min(1,e/_TF); } } return 1; };   // assombrissement route en tunnel (dégradé aux entrées)
  for(let i=0;i<=ND;i++){
    const wi=i%ND, c=dense[wi], d=dDir(wi), hw=c.hw;
    const px=-d[1], py=d[0], y=c.hz*ELEV+(plateau?hw*GUTTER_FRAC*ELEV:0);
    const x1=(c.x+px*hw*o1)*WORLD, z1=(c.y+py*hw*o1)*WORLD;
    const x2=(c.x+px*hw*o2)*WORLD, z2=(c.y+py*hw*o2)*WORLD;
    pos.push(x1,y,z1, x2,y,z2);
    const bv=_tb(wi); cols.push(bv,bv,bv, bv,bv,bv);
    const v=cum/(c.hw*2); uv.push(0,v, 1,v);
    if(i>0){const b=(i-1)*2,a=i*2; idx.push(b,b+1,a, b+1,a+1,a);}
    if(i<ND){const n=dense[(wi+1)%ND];cum+=Math.hypot(n.x-c.x,n.y-c.y);}
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));
  g.setIndex(idx); g.computeVertexNormals();
  const mat = textured
    ? ps1ify(new THREE.MeshLambertMaterial({map:roadTexture(),side:THREE.DoubleSide,vertexColors:true}))
    : ps1ify(new THREE.MeshLambertMaterial({color,side:THREE.DoubleSide,vertexColors:true}));
  return new THREE.Mesh(g,mat);
}
// Route en GOUTTIÈRE : section en U (creux au centre, bords incurvés qui remontent sur les côtés).
function buildGutterRoad(){
  const K=11, pos=[],uv=[],idx=[],cols=[]; let cum=0;
  const _TF=SUB*0.25, _tb=(wi)=>{ for(const t of TUNNELS){ if(wi>=t[0]&&wi<=t[1]){ const e=Math.min(wi-t[0],t[1]-wi); return 1-0.82*Math.min(1,e/_TF); } } return 1; };   // assombrissement route en tunnel (quasi uniforme, dégradé très court)
  for(let i=0;i<=ND;i++){
    const wi=i%ND,c=dense[wi],d=dDir(wi),hw=c.hw,WH=hw*GUTTER_FRAC;
    const px=-d[1],py=d[0],baseY=c.hz*ELEV, _bv=_tb(wi);
    for(let k=0;k<K;k++){
      const o=-1+2*k/(K-1);
      pos.push((c.x+px*hw*o)*WORLD, baseY+WH*o*o*ELEV, (c.y+py*hw*o)*WORLD);
      uv.push(k/(K-1), cum/(c.hw*2)); cols.push(_bv,_bv,_bv);
    }
    if(i>0 && !(inLoopZone(i)&&inLoopZone(i-1))){const a=i*K,b=(i-1)*K;for(let k=0;k<K-1;k++)idx.push(b+k,b+k+1,a+k, b+k+1,a+k+1,a+k);}
    if(i<ND){const n=dense[(wi+1)%ND];cum+=Math.hypot(n.x-c.x,n.y-c.y);}
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));
  g.setIndex(idx); g.computeVertexNormals();
  const grp=new THREE.Group();
  grp.add(new THREE.Mesh(g, ps1ify(new THREE.MeshLambertMaterial({map:roadTexture(),side:THREE.FrontSide,vertexColors:true}))));   // dessus : route (assombrie en tunnel)
  grp.add(new THREE.Mesh(g, ps1ify(new THREE.MeshBasicMaterial({map:underRoadTex,side:THREE.BackSide}))));
  return grp;
}
const loopBoostTex=pathTexture(BOOST_URI);
const underRoadTex=pathTexture(UNDERROAD_URI);
scene.add(buildGutterRoad());                          // route incurvée
// Barrière verticale au bord haut de la gouttière (là où le mur de contention bloque)
const BARRIER_H=8; // hauteur du muret (unités 3D)
const BARRIER_TILE=18; // longueur (3D) d'une répétition (≈ratio de l'image)
const barrierTex=(function(){
  const c=document.createElement('canvas');c.width=c.height=4;
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.magFilter=THREE.LinearFilter; t.minFilter=THREE.LinearMipmapLinearFilter; t.generateMipmaps=true; t.anisotropy=8;;
  const im=new Image(); im.onload=()=>{c.width=im.width;c.height=im.height;c.getContext('2d').drawImage(im,0,0);t.needsUpdate=true;}; im.src=BARRIER_URI;
  return t;
})();
// portions en tunnel (indices le long du centre lissé) — partagé par murets & tunnels

function inTunnel(i){i=((i%ND)+ND)%ND; for(const t of TUNNELS) if(i>=t[0]&&i<=t[1]) return true; return false;}
function buildBarrier(side){
  const pos=[],uv=[],idx=[]; let cum=0;
  for(let i=0;i<=ND;i++){
    const wi=i%ND,c=dense[wi],d=dDir(wi),hw=c.hw,px=-d[1],py=d[0];
    const edgeY=c.hz*ELEV+hw*GUTTER_FRAC*ELEV;   // haut de la gouttière (= mur de collision à o=1)
    const bx=(c.x+px*hw*side)*WORLD, bz=(c.y+py*hw*side)*WORLD;
    pos.push(bx,edgeY,bz, bx,edgeY+BARRIER_H,bz);
    const u=cum*WORLD/BARRIER_TILE; uv.push(u,0, u,1); // image entière : socle en bas (v=0), bande colorée en haut (v=1)
    if(i>0 && !(inLoopZone(i)&&inLoopZone(i-1))){const b=(i-1)*2,a=i*2;idx.push(b,b+1,a, b+1,a+1,a);} // muret retiré sous le looping
    if(i<ND){const n=dense[(wi+1)%ND];cum+=Math.hypot(n.x-c.x,n.y-c.y);}
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx); g.computeVertexNormals();
  return new THREE.Mesh(g, ps1ify(new THREE.MeshLambertMaterial({map:barrierTex,side:THREE.DoubleSide})));
}
scene.add(buildBarrier(1)); scene.add(buildBarrier(-1));

// ════════ BARRIÈRES LE LONG DU LOOPING (mêmes que la route, suivent la normale du rail) ════════
function buildLoopBarrier(L,side){
  const N=140, hw=L.HW, WH=hw*GUTTER_FRAC, pos=[],uv=[],idx=[]; let cum=0,prev=null;
  const P=new THREE.Vector3(),U=new THREE.Vector3();
  for(let i=0;i<=N;i++){ const th=TWO_PI*i/N, t=i/N; loopPosAt(L,th,P); loopUpAt(L,th,U); const ft=ftAt(L,t);
    const lx=-ft.z, lz=ft.x, WH2=WH*(Math.cos(th)+1)/2;
    if(prev)cum+=P.distanceTo(prev);
    const bx=P.x+lx*side*hw+U.x*WH2, by=P.y+U.y*WH2, bz=P.z+lz*side*hw+U.z*WH2;   // bord de la gouttière
    pos.push(bx,by,bz, bx+U.x*BARRIER_H, by+U.y*BARRIER_H, bz+U.z*BARRIER_H);      // base + sommet (le long de la normale)
    const u=cum/BARRIER_TILE; uv.push(u,0, u,1);
    if(i>0){ const b=(i-1)*2,a=i*2; idx.push(b,b+1,a, b+1,a+1,a); }
    prev=P.clone();
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx); g.computeVertexNormals();
  return new THREE.Mesh(g, ps1ify(new THREE.MeshLambertMaterial({map:barrierTex,side:THREE.DoubleSide})));
}

// ════════ TUNNELS (coque fermée : parois verticales + voûte, scellée) ════════
function tunTex(uri){ // data URI → Image+CanvasTexture (fiable file://), filtrage lisse + répétition
  const cv=document.createElement('canvas');cv.width=cv.height=4;
  const t=new THREE.CanvasTexture(cv); t.wrapS=t.wrapT=THREE.RepeatWrapping;
  const im=new Image(); im.onload=()=>{cv.width=im.width;cv.height=im.height;cv.getContext('2d').drawImage(im,0,0);t.needsUpdate=true;}; im.src=uri;
  return t;
}
const tunnelTex=tunTex(TUNNEL_IN_URI);            // intérieur
const tunnelExtTex=tunTex(TUNNEL_EXT_URI);        // extérieur (miroir, haut de l'image = sommet)
const tunnelRebordTex=tunTex(TUNNEL_REBORD_URI);  // rebord d'épaisseur (entrée/sortie)
function buildTunnel(a,b){
  const THICK=4.5, WALLH=10, A=11, DROP=8, WIDEN=1.08;
  const prof=[[-1,0,0]];
  for(let j=0;j<=A;j++){const th=Math.PI*j/A; prof.push([-Math.cos(th),WALLH,Math.sin(th)]);}
  prof.push([1,0,0]); const K=prof.length;
  const inP=[],outP=[],uvIn=[],uvOut=[],idx=[]; let cum=0; const ringsIn=[],ringsOut=[];
  for(let i=a;i<=b;i++){
    const wi=((i%ND)+ND)%ND, c=dense[wi], d=dDir(wi), hw=c.hw, px=-d[1], py=d[0];
    const springY=c.hz*ELEV+hw*GUTTER_FRAC*ELEV+BARRIER_H, archH=hw*WORLD*0.78;
    const cxW=c.x*WORLD, czW=c.y*WORLD, cy=springY+WALLH+archH*0.25;
    const ri=[],ro=[];
    for(let k=0;k<K;k++){
      const o=prof[k][0], h=prof[k][1]+prof[k][2]*archH;
      const X=(c.x+px*hw*o*WIDEN)*WORLD, Y=springY-DROP+h, Z=(c.y+py*hw*o*WIDEN)*WORLD;
      let nX=X-cxW,nY=Y-cy,nZ=Z-czW,L=Math.hypot(nX,nY,nZ)||1; nX/=L;nY/=L;nZ/=L;
      inP.push(X,Y,Z); outP.push(X+nX*THICK,Y+nY*THICK,Z+nZ*THICK);
      uvIn.push(k/(K-1), cum/(c.hw*2));                  // intérieur : tour de voûte × longueur
      uvOut.push(cum/(c.hw*2), 1-Math.abs(2*k/(K-1)-1)); // extérieur : longueur × MIROIR (V=1 au sommet de la voûte)
      ri.push([X,Y,Z]); ro.push([X+nX*THICK,Y+nY*THICK,Z+nZ*THICK]);
    }
    ringsIn.push(ri); ringsOut.push(ro);
    if(i>a){const r=(i-a)*K,p=(i-a-1)*K;for(let k=0;k<K-1;k++)idx.push(p+k,p+k+1,r+k, p+k+1,r+k+1,r+k);}
    const n=dense[((wi+1)%ND)]; cum+=Math.hypot(n.x-c.x,n.y-c.y);
  }
  const grp=new THREE.Group();
  const mk=(P,uvA,mat)=>{const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(P,3));
    g.setAttribute('uv',new THREE.Float32BufferAttribute(uvA,2)); g.setIndex(idx.slice()); g.computeVertexNormals();
    return new THREE.Mesh(g,mat);};
  grp.add(mk(inP, uvIn, new THREE.MeshBasicMaterial({map:tunnelTex,side:THREE.BackSide})));            // intérieur lumineux
  grp.add(mk(outP, uvOut, ps1ify(new THREE.MeshLambertMaterial({map:tunnelExtTex,side:THREE.FrontSide})))); // extérieur éclairé
  // rebord d'épaisseur (texturé) : bouchons d'extrémité + rebords de base
  const capPos=[],capUV=[],capIdx=[]; let vc=0;
  for(const [ri,ro] of [[ringsIn[0],ringsOut[0]],[ringsIn[ringsIn.length-1],ringsOut[ringsOut.length-1]]]){ // entrée/sortie
    const base=vc;
    for(let k=0;k<K;k++){capPos.push(ri[k][0],ri[k][1],ri[k][2], ro[k][0],ro[k][1],ro[k][2]); capUV.push(k/(K-1),0, k/(K-1),1); vc+=2;}

    const beamLen=2*off*WORLD+10; const beam=new THREE.Mesh(new THREE.BoxGeometry(beamLen,14,12), postMat); beam.position.set(c.x*WORLD, baseY+H, c.y*WORLD); beam.rotation.y=ry; scene.add(beam);
    const txt=words[(i/(SUB*12))%words.length|0]; const bTex=makeCanvasTex(256,48,(g,w,h)=>{ g.fillStyle='#0b1430'; g.fillRect(0,0,w,h); g.fillStyle='#1ee9ff'; g.fillRect(0,0,w,4); g.fillRect(0,h-4,w,4); g.font='bold 28px monospace'; g.textAlign='center'; g.textBaseline='middle'; g.fillStyle='#cdecff'; g.fillText(txt,w/2,h/2+1); });
